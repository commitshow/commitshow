# Edge Functions — per-function settings.
# We handle auth internally using the service role client, so platform-level
# JWT verification is disabled. Required because new Supabase projects sign
# user JWTs with ES256 which the gateway's legacy verifier doesn't accept.
[functions.analyze-project]
verify_jwt = false

[functions.discover-mds]
verify_jwt = false

[functions.apply-artifact]
verify_jwt = false

[functions.send-tweet]
verify_jwt = false

[functions.auto-tweet]
verify_jwt = false

[functions.og-png]
verify_jwt = false

[functions.audit-preview]
verify_jwt = false

[functions.audit-site-preview]
verify_jwt = false

[functions.deep-probe]
verify_jwt = false

# usage-ingest reads auth.uid() from the user JWT — verify_jwt stays true
# (default) so the gateway rejects unauthenticated calls before our code
# runs. Member ownership of the target project is checked inside.
